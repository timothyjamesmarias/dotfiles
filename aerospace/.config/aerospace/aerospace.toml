start-at-login = true

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layout
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Auto-switch to passthrough mode for apps that need alt/meta
[[on-focus-changed]]
if.app-id = 'org.gnu.Emacs'
run = 'mode passthrough'

[[on-focus-changed]]
if.app-id = 'io.alacritty'
run = 'mode passthrough'

[[on-focus-changed]]
if.app-id != 'org.gnu.Emacs'
if.app-id != 'io.alacritty'
run = 'mode main'

# Gaps
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.right = 8
outer.top = 8
outer.bottom = 8

# Main keybindings
[mode.main.binding]
# Focus (alt + hjkl)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move windows (alt + shift + hjkl)
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize (alt + ctrl + hjkl)
alt-ctrl-h = 'resize width -50'
alt-ctrl-j = 'resize height +50'
alt-ctrl-k = 'resize height -50'
alt-ctrl-l = 'resize width +50'

# Layout controls
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-f = 'fullscreen'
alt-shift-space = 'layout floating tiling'

# Workspaces (alt + number)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'

# Move window to workspace (alt + shift + number)
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'

# App hotkeys (alt + key → jump to app)
alt-e = 'exec-and-forget open -a Emacs'
alt-b = 'exec-and-forget open -a "Arc"'
alt-t = 'exec-and-forget open -a Alacritty'
alt-s = 'exec-and-forget open -a Slack'
alt-m = 'exec-and-forget open -a Mail'

# Service mode for less common operations
alt-shift-semicolon = 'mode service'

# Passthrough mode — alt keys go directly to the focused app
[mode.passthrough.binding]
alt-shift-semicolon = 'mode main'

[mode.service.binding]
esc = 'mode main'
r = ['flatten-workspace-tree', 'mode main']
alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']
